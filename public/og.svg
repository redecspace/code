<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;family=Poppins:wght@600;700&amp;display=swap');
    </style>
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0F1A" />
      <stop offset="1" stop-color="#1A1A2E" />
    </linearGradient>
    <filter id="glow" x="-100" y="-100" width="1400" height="830" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="120" result="blur"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg_gradient)"/>
  
  <!-- Subtle Background Glows -->
  <g filter="url(#glow)" opacity="0.3">
    <circle cx="200" cy="150" r="180" fill="#8B5CF6"/>
    <circle cx="1000" cy="480" r="220" fill="#4C1D95"/>
  </g>
  
  <!-- Central Content -->
  <g transform="translate(600, 315)">
    <!-- Main Logo Text: Montserrat -->
    <text text-anchor="middle" y="0" font-family="'Montserrat', sans-serif" font-weight="900" font-size="140" fill="white">
      <tspan fill="#C084FC">Re</tspan><tspan fill="#8B5CF6">dec.</tspan>
    </text>
    
    <!-- Subtitle: Poppins -->
    <text text-anchor="middle" y="90" font-family="'Poppins', sans-serif" font-weight="600" font-size="48" fill="#94A3B8">
      Free &amp; Open source Tools for Everyone
    </text>
  </g>
  
  <!-- URL at Bottom: Poppins -->
  <text x="600" y="560" text-anchor="middle" font-family="'Poppins', sans-serif" font-weight="700" font-size="28" fill="#64748B" opacity="0.8" letter-spacing="2">
    REDEC.SPACE
  </text>
</svg>
